<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tower - Laya Tower RPG</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body class="page page-tower">
  <div class="tower-map-bg"></div>
  <main class="screen tower-layout">
    <section class="panel glass tower-sidebar">
      <p class="eyebrow">Tower Progress</p>
      <h2 id="towerHeroName">Hero</h2>
      <p id="towerHeroInfo" class="class-role"></p>
      <div class="stats-box compact">
        <div><span>Unlocked</span><strong id="unlockedFloor"></strong></div>
        <div><span>Current</span><strong id="currentFloor"></strong></div>
      </div>
      <div class="legend">
        <div><span class="pill normal">Normal</span> ชั้นทั่วไป</div>
        <div><span class="pill mini">Mini Boss</span> ทุกชั้นที่ลงท้าย 5</div>
        <div><span class="pill boss">Boss</span> ทุกชั้นที่ลงท้าย 0</div>
      </div>
      <a class="btn btn-secondary" href="menu.html">Back to Menu</a>
    </section>

    <section class="panel glass floor-panel">
      <div class="panel-header">
        <p class="eyebrow">Choose Floor</p>
        <h2>100 Floors Tower</h2>
      </div>
      <div id="floorGrid" class="floor-grid"></div>
    </section>
  </main>

  <script src="js/player.js"></script>
  <script src="js/tower.js"></script>
  <script src="js/game.js"></script>
  <script>
    window.LayaGame.initTowerPage();
  </script>
</body>
</html>
