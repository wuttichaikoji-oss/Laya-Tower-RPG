<!DOCTYPE html><html lang="th"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Create Character</title><link rel="stylesheet" href="css/style.css"></head><body class="screen"><div class="panel create-layout"><div class="form-side"><h2>Create Character</h2><label>ชื่อตัวละคร</label><input id="heroName" type="text" maxlength="20" placeholder="เช่น หน่อย"><label>เพศ</label><div class="row two"><button class="toggle active" data-gender="female">Female</button><button class="toggle" data-gender="male">Male</button></div><label>อาชีพ</label><div id="classList" class="class-list"></div><div class="row"><button id="createBtn" class="primary">Create Hero</button><button id="backBtn">Back</button></div></div><div class="preview-side"><h2>Preview</h2><div class="preview-card"><img id="previewImage" class="preview-image" alt="hero preview"><div id="previewName" class="hero-title">Arcanist</div><div id="previewRole" class="muted">Magic DPS</div><div class="stats-grid"><div>HP <span id="statHP">900</span></div><div>MP <span id="statMP">140</span></div><div>ATK <span id="statATK">95</span></div><div>DEF <span id="statDEF">45</span></div></div><p id="previewDesc" class="desc">Master of elemental magic.</p></div></div></div><script src="js/hero-data.js"></script><script src="js/save-system.js"></script><script src="js/create-character.js"></script></body></html>
