<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Battle - Laya Tower RPG</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body class="page page-battle">
  <div class="battle-bg"></div>
  <main class="screen battle-layout">
    <section class="battle-topbar panel glass">
      <div>
        <p class="eyebrow">Battle Scene</p>
        <h2 id="battleFloorTitle">Floor 1</h2>
      </div>
      <div class="battle-links">
        <a class="btn btn-secondary small-btn" href="tower.html">Tower</a>
        <a class="btn btn-secondary small-btn" href="menu.html">Menu</a>
      </div>
    </section>

    <section class="battle-stage">
      <div class="character-side hero-side">
        <div class="unit-card glass">
          <div class="unit-header">
            <h3 id="heroBattleName">Hero</h3>
            <span id="heroElementBadge" class="element-badge">Neutral Lv1</span>
          </div>
          <div id="heroSprite" class="sprite hero-sprite idle"></div>
          <div class="bars">
            <label>HP</label>
            <div class="bar"><div id="heroHpBar" class="fill hp-fill"></div></div>
            <small id="heroHpText"></small>
            <label>MP</label>
            <div class="bar"><div id="heroMpBar" class="fill mp-fill"></div></div>
            <small id="heroMpText"></small>
          </div>
        </div>
      </div>

      <div id="battleCenterText" class="battle-center-text">Turn Based Battle</div>

      <div class="character-side enemy-side">
        <div class="unit-card glass enemy-card">
          <div class="unit-header">
            <h3 id="enemyName">Enemy</h3>
            <span id="enemyElementBadge" class="element-badge">Neutral Lv1</span>
          </div>
          <div id="enemySprite" class="sprite enemy-sprite idle"></div>
          <div class="bars">
            <label>HP</label>
            <div class="bar"><div id="enemyHpBar" class="fill hp-fill"></div></div>
            <small id="enemyHpText"></small>
          </div>
        </div>
      </div>
    </section>

    <section class="battle-ui">
      <div class="panel glass command-panel">
        <p class="eyebrow">Commands</p>
        <div class="command-grid">
          <button class="btn btn-primary" id="attackBtn" type="button">Attack</button>
          <button class="btn btn-secondary" id="skillBtn" type="button">Skill</button>
          <button class="btn btn-secondary" id="defendBtn" type="button">Defend</button>
          <button class="btn btn-secondary" id="itemBtn" type="button">Potion</button>
        </div>
        <div id="skillPanel" class="skill-panel hidden"></div>
      </div>

      <div class="panel glass log-panel">
        <p class="eyebrow">Battle Log</p>
        <div id="battleLog" class="battle-log"></div>
      </div>
    </section>
  </main>

  <script src="js/player.js"></script>
  <script src="js/element-table-roc.js"></script>
  <script src="js/battle.js"></script>
  <script src="js/game.js"></script>
  <script>
    window.LayaGame.initBattlePage();
  </script>
</body>
</html>
